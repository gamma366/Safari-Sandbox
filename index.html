<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Safari Sandbox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Lato:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root">
      <style>
        .initial-loader {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100vh;
          background-color: #FDFBF7;
          color: #B08D57;
          font-family: "Cormorant Garamond", serif;
        }
        .spinner {
          width: 40px;
          height: 40px;
          border: 2px solid rgba(176, 141, 87, 0.2);
          border-radius: 50%;
          border-top-color: #B08D57;
          animation: spin 1.5s ease-in-out infinite;
          margin-bottom: 24px;
        }
        h2 {
           letter-spacing: 0.1em;
           font-weight: 500;
        }
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
      </style>
      <div class="initial-loader">
        <div class="spinner"></div>
        <h2>Loading Safari Experience...</h2>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
